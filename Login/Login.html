<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car ERP 系統 - 登入</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f5f6fa;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            height: 70px;
            background: #212529;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 25px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        /* Login Area */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px 45px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }

        .login-icon {
            font-size: 48px;
            color: #0d6efd;
            margin-bottom: 10px;
        }

        .login-title {
            font-size: 22px;
            font-weight: bold;
            color: #212529;
            margin-bottom: 6px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 32px;
        }

        .form-label {
            font-weight: 600;
            color: #343a40;
            font-size: 14px;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
            border: 1px solid #dee2e6;
            font-size: 14px;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
        }

        .input-group-text {
            background: #f8f9fa;
            border-color: #dee2e6;
            color: #6c757d;
            border-radius: 8px 0 0 8px;
        }

        .input-group .form-control {
            border-radius: 0 8px 8px 0;
        }

        .btn-login {
            background: #212529;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            transition: .3s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #0d6efd;
            color: white;
        }

        .divider {
            border-top: 1px solid #e9ecef;
            margin: 24px 0;
        }

        .forgot-link {
            font-size: 13px;
            color: #6c757d;
            text-decoration: none;
            transition: color .2s;
        }

        .forgot-link:hover {
            color: #0d6efd;
        }

        .error-msg {
            display: none;
            background: #fff5f5;
            border: 1px solid #f5c6cb;
            color: #842029;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="logo">🚗 Car ERP 系統</div>
    </header>

    <!-- Login Area -->
    <div class="login-wrapper">
        <div class="login-card">

            <div class="text-center mb-2">
                <div class="login-icon"><i class="fa-solid fa-car"></i></div>
                <div class="login-title">歡迎登入</div>
                <div class="login-subtitle">請輸入您的帳號與密碼</div>
            </div>

            <!-- 錯誤提示 -->
            <div class="error-msg" id="errorMsg">
                <i class="fa-solid fa-circle-xmark me-2"></i>帳號或密碼錯誤，請重新輸入。
            </div>

            <form id="loginForm" novalidate>

                <!-- 帳號 -->
                <div class="mb-3">
                    <label class="form-label" for="username">
                        <i class="fa-solid fa-user me-1"></i>帳號
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="請輸入帳號" autocomplete="username" required>
                    </div>
                </div>

                <!-- 密碼 -->
                <div class="mb-3">
                    <label class="form-label" for="password">
                        <i class="fa-solid fa-lock me-1"></i>密碼
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="請輸入密碼" autocomplete="current-password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword" tabindex="-1">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- 記住我 -->
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe" style="font-size:13px; color:#6c757d;">
                            記住我
                        </label>
                    </div>
                    <a href="#" class="forgot-link">
                        <i class="fa-solid fa-key me-1"></i>忘記密碼？
                    </a>
                </div>

                <!-- 登入按鈕 -->
                <button type="submit" class="btn-login mt-3">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>登入
                </button>

            </form>

            <div class="divider"></div>

            <div class="text-center" style="font-size:12px; color:#adb5bd;">
                &copy; 2026 Car ERP 系統 &nbsp;|&nbsp; 版本 1.0.0
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 顯示 / 隱藏密碼
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // 表單送出
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            // TODO: 替換為實際 API 驗證
            if (username === 'admin' && password === 'admin') {
                errorMsg.style.display = 'none';
                window.location.href = '前端介面固定框架.html';
            } else {
                errorMsg.style.display = 'block';
            }
        });
    </script>

</body>

</html>
