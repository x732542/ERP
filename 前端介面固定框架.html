                                        <label class="form-label small fw-bold">汽車顏色 <span class="text-muted fw-normal">格式:文字, 上限10</span></label>
                                        <input type="text" class="form-control form-control-sm" id="pur-color" maxlength="10" placeholder="例：黑">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">收車日期 <span class="text-muted fw-normal">格式:時間, 西元年</span></label>
                                        <input type="date" class="form-control form-control-sm" id="pur-date">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">認證狀態 <span class="text-muted fw-normal">下拉選單 格式:布林 只有是或否</span></label>
                                        <select class="form-select form-select-sm" id="pur-cert">
                                            <option value="可認證">可認證</option>
                                            <option value="未通過">未通過</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label small fw-bold">備註 <span class="text-muted fw-normal">格式:文字, 上限:待定</span></label>
                                        <textarea class="form-control form-control-sm" id="pur-note" rows="3" placeholder="備註內容..."></textarea>
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                <button type="button" class="btn btn-primary fw-bold" onclick="savePurchaseRecord()">儲存</button>
                            </div>
                        </div>
                    </div>
                </div>

                <script>
                    let purchaseEditRow = null;

                    function openPurchaseAdd() {
                        purchaseEditRow = null;
                        document.getElementById('purchaseModalTitle').innerHTML = '<i class="fa-solid fa-cart-shopping me-2"></i>新增採購記錄';
                        ['pur-brand','pur-model','pur-year','pur-cc','pur-buy','pur-cost','pur-sell','pur-plate','pur-color','pur-note'].forEach(id => document.getElementById(id).value = '');
                        document.getElementById('pur-cert').value = '可認證';
                        document.getElementById('pur-date').value = '';
                    }

                    function openPurchaseEdit(btn) {
                        purchaseEditRow = btn.closest('tr');
                        const cells = purchaseEditRow.querySelectorAll('td');
                        document.getElementById('purchaseModalTitle').innerHTML = '<i class="fa-solid fa-pen me-2"></i>編輯採購記錄';
                        document.getElementById('pur-plate').value  = cells[1].textContent.trim();
                        document.getElementById('pur-brand').value  = cells[2].textContent.trim();
                        document.getElementById('pur-model').value  = cells[3].textContent.trim();
                        document.getElementById('pur-year').value   = cells[4].textContent.trim();
                        document.getElementById('pur-cc').value     = cells[5].textContent.trim();
                        document.getElementById('pur-color').value  = cells[6].textContent.trim();
                        document.getElementById('pur-buy').value    = cells[7].textContent.trim();
                        document.getElementById('pur-cost').value   = cells[8].textContent.trim();
                        document.getElementById('pur-sell').value   = cells[9].textContent.trim();
                        document.getElementById('pur-date').value   = cells[10].textContent.trim().replace(/\\//g, '-');
                        const certText = cells[11].querySelector('span').textContent.trim();
                        document.getElementById('pur-cert').value   = certText === '可' ? '可認證' : '未通過';
                        document.getElementById('pur-note').value   = '';
                        new bootstrap.Modal(document.getElementById('purchaseModal')).show();
                    }

                    function savePurchaseRecord() {
                        const plate  = document.getElementById('pur-plate').value;
                        const brand  = document.getElementById('pur-brand').value;
                        const model  = document.getElementById('pur-model').value;
                        const year   = document.getElementById('pur-year').value;
                        const cc     = document.getElementById('pur-cc').value;
                        const color  = document.getElementById('pur-color').value;
                        const buy    = document.getElementById('pur-buy').value;
                        const cost   = document.getElementById('pur-cost').value;
                        const sell   = document.getElementById('pur-sell').value;
                        const date   = document.getElementById('pur-date').value.replace(/-/g, '/');
                        const cert   = document.getElementById('pur-cert').value;
                        const certBadge = cert === '可認證'
                            ? '<span class="badge bg-success">可</span>'
                            : '<span class="badge bg-danger">X</span>';
                        const tbody = document.getElementById('purchaseTableBody');
                        if (purchaseEditRow) {
                            const cells = purchaseEditRow.querySelectorAll('td');
                            cells[1].textContent = plate;
                            cells[2].textContent = brand;
                            cells[3].textContent = model;
                            cells[4].textContent = year;
                            cells[5].textContent = cc;
                            cells[6].textContent = color;
                            cells[7].textContent = buy;
                            cells[8].textContent = cost;
                            cells[9].textContent = sell;
                            cells[10].textContent = date;
                            cells[11].innerHTML = certBadge;
                        } else {
                            const rowCount = tbody.rows.length + 1;
                            const tr = document.createElement('tr');
                            tr.innerHTML = \`
                                <td>\${rowCount}</td><td>\${plate}</td><td>\${brand}</td><td>\${model}</td>
                                <td>\${year}</td><td>\${cc}</td><td>\${color}</td>
                                <td style="background:#e8f5e9;font-weight:bold">\${buy}</td>
                                <td style="background:#f3e5f5;font-weight:bold">\${cost}</td>
                                <td style="background:#e3f2fd;font-weight:bold">\${sell}</td>
                                <td>\${date}</td>
                                <td>\${certBadge}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary me-1" onclick="openPurchaseEdit(this)">編輯</button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deletePurchaseRow(this)">刪除</button>
                                </td>\`;
                            tbody.appendChild(tr);
                        }
                        bootstrap.Modal.getInstance(document.getElementById('purchaseModal')).hide();
                    }

                    function deletePurchaseRow(btn) {
                        if (confirm('確定要刪除此筆採購記錄？')) {
                            btn.closest('tr').remove();
                        }
                    }
                <\/script>
                </div><!-- /pane-pur -->
                </div><!-- /tab-content -->
            `,
            "文件管理": `
                <div class="page-title">核心 JSON 資料結構 (Frame 1 右下)</div>
                <div class="card-box">
                    <h5 class="mb-3 fw-bold text-dark border-bottom pb-2"><i class="fa-solid fa-code me-2"></i>元數據定義檔</h5>
                    <pre class="bg-dark text-success p-3 rounded" style="font-family: monospace; font-size: 14px;"><code>{
  "component_id": "CAR-2026-SYS",
  "layout": {
    "frame_1": "main_workflow",
    "frame_2": "input_form"
  }
}</code></pre>
                </div>
            `
        };

        // querySelectorAll: 抓去所有 .menu-item 的元素
        const menuItems = document.querySelectorAll(".menu-item"); // 取得所有選單選項
        const pageContent = document.getElementById("pageContent");// 取得內容區

        // 載入初始頁面（儀錶板）
        pageContent.innerHTML = pageTemplates["儀錶板"];

        // 將每個選項綁定 click事件
        menuItems.forEach(item => {
            item.addEventListener("click", function () {

                // 取消所有的 active
                menuItems.forEach(x =>
                    x.classList.remove("active")
                );

                // 給目前點擊的選單 active
                this.classList.add("active");

                // 取得 dataset.page
                let pageName = this.dataset.page;

                // 若 pageTemplates 有對應頁面則使用，否則顯示預設內容
                pageContent.innerHTML = pageTemplates[pageName] ?? `
                    <div class="page-title">${pageName}</div>
                    <div class="card-box">
                        <p>這裡放置「${pageName}」功能內容</p>
                    </div>`;
            });
        });

    </script>

</body>

</html>
