<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car ERP前端介面固定框架</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./前端介面固定框架.css">


</head>

<body>

    <!-- Header -->
    <header class="header">

        <div class="logo">
            🚗 智富車庫
        </div>

        <div class="user-area">

            <!-- header 齒輪設定欄位 -->
            <div class="dropdown">
                <i class="fa-solid fa-gear setting-btn" data-bs-toggle="dropdown"></i>
                <ul class="dropdown-menu">

                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="fa-solid fa-key me-2"></i>
                            變更密碼
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="fa-solid fa-right-from-bracket me-2"></i>
                            登出
                        </a>
                    </li>
                </ul>
            </div>

            <!-- header 名稱 + 職稱 -->
            <div class="user-info">
                <div class="user-name">王大明</div>
                <div class="user-role">業務(職稱)</div>
            </div>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="menu-item active" data-page="儀錶板">
            <i class="fa-solid fa-chart-line"></i>
            儀錶板
        </div>

        <div class="menu-item" data-page="車輛管理">
            <i class="fa-solid fa-car"></i>
            車輛管理
        </div>

        <div class="menu-item" data-page="客戶管理">
            <i class="fa-solid fa-users"></i>
            客戶管理
        </div>

        <div class="menu-item" data-page="訂單管理">
            <i class="fa-solid fa-file-invoice"></i>
            訂單管理
        </div>

        <div class="menu-item" data-page="業務管理">
            <i class="fa-solid fa-user-tie"></i>
            業務管理
        </div>

        <div class="menu-item" data-page="會計頁面">
            <i class="fa-solid fa-calculator"></i>
            會計頁面
        </div>

        <div class="menu-item" data-page="車籍資料">
            <i class="fa-solid fa-id-card"></i>
            車籍資料
        </div>

        <div class="menu-item" data-page="文件管理">
            <i class="fa-solid fa-folder-open"></i>
            文件管理
        </div>

    </aside>

    <!-- Content -->

    <main class="content">

        <div id="pageContent"></div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        // ===== 採購管理功能（全域，供 $.load 載入的 HTML 內 onclick 使用） =====
        let purchaseEditRow = null;

        function openPurchaseAdd() {
            purchaseEditRow = null;
            $('#purchaseModalTitle').html('<i class="fa-solid fa-cart-shopping me-2"></i>新增採購記錄');
            $('#pur-brand, #pur-model, #pur-year, #pur-cc, #pur-buy, #pur-cost, #pur-sell, #pur-plate, #pur-color, #pur-note').val('');
            $('#pur-cert').val('可認證');
            $('#pur-date').val('');
        }

        function openPurchaseEdit(btn) {
            purchaseEditRow = $(btn).closest('tr')[0];
            const $cells = $(purchaseEditRow).find('td');
            $('#purchaseModalTitle').html('<i class="fa-solid fa-pen me-2"></i>編輯採購記錄');
            $('#pur-plate').val($cells.eq(1).text().trim());
            $('#pur-brand').val($cells.eq(2).text().trim());
            $('#pur-model').val($cells.eq(3).text().trim());
            $('#pur-year').val($cells.eq(4).text().trim());
            $('#pur-cc').val($cells.eq(5).text().trim());
            $('#pur-color').val($cells.eq(6).text().trim());
            $('#pur-buy').val($cells.eq(7).text().trim());
            $('#pur-cost').val($cells.eq(8).text().trim());
            $('#pur-sell').val($cells.eq(9).text().trim());
            $('#pur-date').val($cells.eq(10).text().trim().replace(/\//g, '-'));
            const certText = $cells.eq(11).find('span').text().trim();
            $('#pur-cert').val(certText === '可' ? '可認證' : '未通過');
            $('#pur-note').val('');
            new bootstrap.Modal(document.getElementById('purchaseModal')).show();
        }

        function savePurchaseRecord() {
            const plate  = $('#pur-plate').val();
            const brand  = $('#pur-brand').val();
            const model  = $('#pur-model').val();
            const year   = $('#pur-year').val();
            const cc     = $('#pur-cc').val();
            const color  = $('#pur-color').val();
            const buy    = $('#pur-buy').val();
            const cost   = $('#pur-cost').val();
            const sell   = $('#pur-sell').val();
            const date   = $('#pur-date').val().replace(/-/g, '/');
            const cert   = $('#pur-cert').val();
            const certBadge = cert === '可認證'
                ? '<span class="badge bg-success">可</span>'
                : '<span class="badge bg-danger">X</span>';
            const $tbody = $('#purchaseTableBody');
            if (purchaseEditRow) {
                const $cells = $(purchaseEditRow).find('td');
                $cells.eq(1).text(plate);
                $cells.eq(2).text(brand);
                $cells.eq(3).text(model);
                $cells.eq(4).text(year);
                $cells.eq(5).text(cc);
                $cells.eq(6).text(color);
                $cells.eq(7).text(buy);
                $cells.eq(8).text(cost);
                $cells.eq(9).text(sell);
                $cells.eq(10).text(date);
                $cells.eq(11).html(certBadge);
            } else {
                const rowCount = $tbody.find('tr').length + 1;
                $tbody.append(`
                    <tr>
                        <td>${rowCount}</td><td>${plate}</td><td>${brand}</td><td>${model}</td>
                        <td>${year}</td><td>${cc}</td><td>${color}</td>
                        <td style="background:#e8f5e9;font-weight:bold">${buy}</td>
                        <td style="background:#f3e5f5;font-weight:bold">${cost}</td>
                        <td style="background:#e3f2fd;font-weight:bold">${sell}</td>
                        <td>${date}</td>
                        <td>${certBadge}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="openPurchaseEdit(this)">編輯</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deletePurchaseRow(this)">刪除</button>
                        </td>
                    </tr>`);
            }
            bootstrap.Modal.getInstance(document.getElementById('purchaseModal')).hide();
        }

        function deletePurchaseRow(btn) {
            if (confirm('確定要刪除此筆採購記錄？')) {
                $(btn).closest('tr').remove();
            }
        }

        // ===== 會計記錄功能（全域） =====
        function deleteAccRow(btn) {
            if (confirm('確定要刪除此筆記錄？')) {
                $(btn).closest('tr').remove();
            }
        }

        function openAccEdit(btn) {
            const $cells = $(btn).closest('tr').find('td');
            $('#accModalTitle').html('<i class="fa-solid fa-pen me-2"></i>編輯會計記錄');
            $('#acc-plate').val($cells.eq(1).text());
            $('#acc-brand').val($cells.eq(2).text());
            $('#acc-model').val($cells.eq(3).text());
            $('#acc-year').val($cells.eq(4).text());
            $('#acc-buy').val($cells.eq(5).text());
            $('#acc-repair').val($cells.eq(6).text());
            $('#acc-commission').val($cells.eq(7).text());
            $('#acc-deposit').val($cells.eq(8).text());
            $('#acc-balance').val($cells.eq(9).text());
            $('#acc-loan').val($cells.eq(10).text());
            $('#acc-cert').val($cells.eq(11).text().trim());
            $('#acc-sell').val($cells.eq(12).text());
            $('#acc-date').val($cells.eq(13).text().trim().replace(/\//g, '-'));
            new bootstrap.Modal(document.getElementById('accModal')).show();
        }

        function saveAccRecord() {
            alert('記錄已儲存！');
            bootstrap.Modal.getInstance(document.getElementById('accModal')).hide();
        }

        // ===== 頁面導覽（jQuery） =====
        $(function () {
            const $menuItems   = $('.menu-item');
            const $pageContent = $('#pageContent');

        // querySelectorAll: 抓去所有 .menu-item 的元素 (改用 jQuery)
        function loadPage(pageName) {
            $menuItems.removeClass('active');
            $menuItems.filter('[data-page="' + pageName + '"]').addClass('active');

            if (pageName === '儀錶板') {
                $pageContent.html('<div class="text-center py-5 text-muted"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><p class="mt-3">載入中…</p></div>');
                $pageContent.load('Dashboard/dashboard-content.html');
            } else if (pageName === '會計頁面') {
                $pageContent.html('<div class="text-center py-5 text-muted"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><p class="mt-3">載入中…</p></div>');
                $pageContent.load('Purchase/purchase-content.html');
            } else {
                $pageContent.html(
                    '<div class="page-title">' + pageName + '</div>' +
                    '<div class="card-box text-center py-5 text-muted">' +
                    '<i class="fa-solid fa-hammer fa-2x mb-3 d-block"></i>' +
                    '<p class="mb-0 fw-bold">「' + pageName + '」頁面建置中…</p></div>'
                );
            }
        }

        // 初始載入儀錶板
        loadPage('儀錶板');

        // 將每個選項綁定 click 事件
        $menuItems.on('click', function () {
            loadPage($(this).data('page'));
        });

        }); // end $(function)

    </script>

</body>

</html>
